name: Tennis squeeze-slot bot

on:
  # Cron disabled while we debug failures. Re-enable by uncommenting.
  # schedule:
  #   - cron: '*/5 9-15 * * *'
  #   - cron: '0,5,10,15,20 16 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (do not click final Confirm)'
        required: false
        default: 'false'

concurrency:
  group: tennis-book
  cancel-in-progress: false

jobs:
  book:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      issues: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps
        run: npm install --no-audit --no-fund

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run booker
        id: run
        env:
          KALLANG_EMAIL: ${{ secrets.KALLANG_EMAIL }}
          KALLANG_PASSWORD: ${{ secrets.KALLANG_PASSWORD }}
          HEADLESS: '1'
          DRY_RUN: ${{ github.event.inputs.dry_run == 'true' && '1' || '0' }}
        run: npm run book

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: run-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/
          retention-days: 7

      - name: Notify on booking (create issue)
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let summary = { booked: false, reason: 'unknown' };
            try {
              summary = JSON.parse(fs.readFileSync('artifacts/result.json', 'utf8'));
            } catch (_) {}
            if (!summary.booked) return;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Tennis booked — ${new Date().toISOString().slice(0,16)} SGT`,
              body: [
                '**Booked:** ' + summary.booked,
                '**Reason:** ' + summary.reason,
                '**Run:** ' + `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                '',
                'Check your Kallang account to confirm.',
              ].join('\n'),
            });
